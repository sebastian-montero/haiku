services:
  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: haiku
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cloudbeaver:
    image: dbeaver/cloudbeaver
    restart: always
    ports:
      - "8978:8978"
    environment:
      CB_SERVER_NAME: CB Server
      CB_ADMIN_NAME: cbeaver
      CB_ADMIN_PASSWORD: cbeaver
      CB_DB_DRIVER: postgresql
      CB_DB_URL: jdbc:postgresql://postgres:5432/haiku
      CB_DB_USER: admin
      CB_DB_PASSWORD: secret
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    depends_on:
      - postgres

volumes:
  postgres_data:
  cloudbeaver_data: