services:
  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  cloudbeaver:
    image: dbeaver/cloudbeaver
    restart: always
    ports:
      - "8978:8978"
    volumes: 
      - cloudbeaver:/opt/cloudbeaver/workspace           
    depends_on:
      - postgres

volumes:
  postgres_data:
  cloudbeaver: